<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revisión GitBook — Vambe</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ─── Diff Engine ────────────────────────────────────────────────────────────
function buildLCS(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
  for (let i = m - 1; i >= 0; i--)
    for (let j = n - 1; j >= 0; j--)
      dp[i][j] = a[i] === b[j] ? dp[i+1][j+1] + 1 : Math.max(dp[i+1][j], dp[i][j+1]);
  const diff = [];
  let i = 0, j = 0;
  while (i < m || j < n) {
    if (i < m && j < n && a[i] === b[j])       { diff.push({ t: '=', s: a[i] }); i++; j++; }
    else if (j < n && (i >= m || dp[i+1]?.[j] >= dp[i]?.[j+1]))
                                                { diff.push({ t: '+', s: b[j] }); j++; }
    else                                        { diff.push({ t: '-', s: a[i] }); i++; }
  }
  return diff;
}

function diffLines(oldText, newText) {
  const a = (oldText  || '').split('\n');
  const b = (newText  || '').split('\n');
  if (a.length > 500 || b.length > 500)
    return [
      { t: 'i', s: `Archivo grande (${a.length} → ${b.length} líneas). Mostrando primeras 500 líneas.` },
      ...buildLCS(a.slice(0, 500), b.slice(0, 500))
    ];
  return buildLCS(a, b);
}

function toHunks(diff, ctx = 3) {
  const changed = diff.map((d, i) => (d.t !== '=' && d.t !== 'i' ? i : -1)).filter(x => x >= 0);
  if (!changed.length) return [];
  const ranges = [];
  let s = Math.max(0, changed[0] - ctx), e = Math.min(diff.length, changed[0] + ctx + 1);
  for (let k = 1; k < changed.length; k++) {
    const ns = Math.max(0, changed[k] - ctx);
    if (ns <= e) e = Math.min(diff.length, changed[k] + ctx + 1);
    else { ranges.push([s, e]); s = ns; e = Math.min(diff.length, changed[k] + ctx + 1); }
  }
  ranges.push([s, e]);
  return ranges;
}

// ─── Badge ───────────────────────────────────────────────────────────────────
function Badge({ tipo }) {
  const styles = {
    actualizar: 'bg-blue-100 text-blue-700 border border-blue-200',
    crear:      'bg-emerald-100 text-emerald-700 border border-emerald-200',
    sin_cambios:'bg-gray-100 text-gray-500 border border-gray-200',
  };
  const labels = { actualizar: 'ACTUALIZAR', crear: 'CREAR', sin_cambios: 'SIN CAMBIOS' };
  return (
    <span className={`text-xs font-bold px-2 py-0.5 rounded-md tracking-wide ${styles[tipo] || styles.sin_cambios}`}>
      {labels[tipo] || tipo.toUpperCase()}
    </span>
  );
}

// ─── DiffView ────────────────────────────────────────────────────────────────
function DiffView({ oldText, newText }) {
  const diff   = useMemo(() => diffLines(oldText, newText), [oldText, newText]);
  const hunks  = useMemo(() => toHunks(diff), [diff]);
  const adds   = diff.filter(d => d.t === '+').length;
  const rms    = diff.filter(d => d.t === '-').length;
  const infoLine = diff.find(d => d.t === 'i');

  if (adds === 0 && rms === 0)
    return <p className="text-xs text-gray-400 mt-3 italic">Sin diferencias de texto detectadas.</p>;

  return (
    <div className="mt-3">
      {infoLine && <p className="text-xs text-amber-600 mb-1">⚠️ {infoLine.s}</p>}
      <p className="text-xs text-gray-400 mb-1.5 mono">
        <span className="text-emerald-600 font-semibold">+{adds}</span>
        {' · '}
        <span className="text-red-500 font-semibold">−{rms}</span>
      </p>
      <div className="rounded-lg border border-gray-200 overflow-auto max-h-[480px] text-xs mono bg-white">
        {hunks.map(([s, e], hi) => (
          <div key={hi}>
            {(hi > 0 || s > 0) && (
              <div className="px-3 py-1 bg-gray-50 text-gray-400 text-center border-y border-gray-100 select-none">
                ···
              </div>
            )}
            {diff.slice(s, e).map((d, idx) => (
              <div
                key={idx}
                className={`flex gap-2 px-3 py-0.5 leading-5
                  ${d.t === '+' ? 'bg-emerald-50 text-emerald-900'
                  : d.t === '-' ? 'bg-red-50 text-red-800 line-through opacity-80'
                  : 'bg-white text-gray-500'}`}
              >
                <span className="w-3 shrink-0 text-right opacity-40 select-none">
                  {d.t === '+' ? '+' : d.t === '-' ? '−' : ' '}
                </span>
                <span className="break-all whitespace-pre-wrap">{d.s || '\u00a0'}</span>
              </div>
            ))}
            {e < diff.length && (
              <div className="px-3 py-1 bg-gray-50 text-gray-400 text-center border-y border-gray-100 select-none">
                ···
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CreatePreview ───────────────────────────────────────────────────────────
function CreatePreview({ content }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="mt-3">
      <button
        onClick={() => setOpen(o => !o)}
        className="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1"
      >
        <span>{open ? '▲' : '▼'}</span>
        {open ? 'Ocultar contenido' : 'Ver contenido del artículo nuevo'}
      </button>
      {open && (
        <pre className="mt-2 p-3 bg-gray-50 border border-gray-200 rounded-lg text-xs mono whitespace-pre-wrap break-all max-h-96 overflow-auto text-gray-700">
          {content}
        </pre>
      )}
    </div>
  );
}

// ─── ActionCard ──────────────────────────────────────────────────────────────
function ActionCard({ action, status, onApprove, onReject }) {
  const [expanded, setExpanded] = useState(action.tipo !== 'sin_cambios');
  const isApproved = status === 'approved';
  const isRejected = status === 'rejected';
  const border = isApproved ? 'border-l-4 border-l-emerald-400'
               : isRejected ? 'border-l-4 border-l-red-400'
               : 'border-l-4 border-l-slate-200';
  return (
    <div className={`bg-white rounded-xl border border-gray-200 shadow-sm mb-3 transition-all ${border} ${isRejected ? 'opacity-55' : ''}`}>
      <div className="flex items-center gap-3 px-4 py-3">
        <Badge tipo={action.tipo} />
        <button
          onClick={() => setExpanded(o => !o)}
          className="flex-1 text-left text-sm mono text-gray-700 hover:text-blue-600 truncate"
          title={action.path}
        >
          {action.path}
        </button>
        {action.tipo !== 'sin_cambios' && (
          <div className="flex gap-1.5 shrink-0">
            <button
              onClick={onApprove}
              title="Aprobar"
              className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all
                ${isApproved
                  ? 'bg-emerald-500 text-white shadow-sm'
                  : 'bg-gray-100 text-gray-500 hover:bg-emerald-50 hover:text-emerald-700'}`}
            >
              ✅ Aprobar
            </button>
            <button
              onClick={onReject}
              title="Rechazar"
              className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all
                ${isRejected
                  ? 'bg-red-500 text-white shadow-sm'
                  : 'bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-700'}`}
            >
              ❌ Rechazar
            </button>
          </div>
        )}
      </div>
      {expanded && (
        <div className="px-4 pb-4 border-t border-gray-50">
          {action.justificacion && (
            <p className="text-xs text-gray-400 mt-3 italic">💡 {action.justificacion}</p>
          )}
          {action.tipo === 'actualizar' && (
            <DiffView oldText={action.contenido_actual || ''} newText={action.contenido_nuevo || ''} />
          )}
          {action.tipo === 'crear' && (
            <CreatePreview content={action.contenido_nuevo || ''} />
          )}
        </div>
      )}
    </div>
  );
}

// ─── Section ─────────────────────────────────────────────────────────────────
function Section({ title, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="mb-7">
      <button
        onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 hover:text-gray-600"
      >
        <span className="text-[10px]">{open ? '▼' : '▶'}</span>
        {title}
      </button>
      {open && children}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [data,        setData]        = useState(null);
  const [loadErr,     setLoadErr]     = useState(null);
  const [loading,     setLoading]     = useState(true);
  const [statuses,    setStatuses]    = useState({});
  const [submitState, setSubmitState] = useState('idle'); // idle | submitting | success | error
  const [submitMsg,   setSubmitMsg]   = useState('');

  // ── Load data from ?gist=ID or #base64json ──
  useEffect(() => {
    (async () => {
      try {
        const params  = new URLSearchParams(window.location.search);
        const gistId  = params.get('gist');
        const hash    = window.location.hash.slice(1);
        let parsed;

        if (gistId) {
          const r = await fetch(`https://api.github.com/gists/${gistId}`);
          if (!r.ok) throw new Error(`No se pudo cargar el Gist (${r.status}). Puede ser privado o inexistente.`);
          const g    = await r.json();
          const file = Object.values(g.files)[0];
          parsed     = JSON.parse(file.content);
        } else if (hash) {
          parsed = JSON.parse(atob(hash));
        } else {
          setLoadErr('No se encontraron datos en la URL. Usá el link completo que llegó a Slack.');
          setLoading(false);
          return;
        }
        setData(parsed);
      } catch (e) {
        setLoadErr(e.message);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const approve = path => setStatuses(s => ({ ...s, [path]: 'approved' }));
  const reject  = path => setStatuses(s => ({ ...s, [path]: 'rejected' }));

  const acciones   = data?.acciones || [];
  const actionable = acciones.filter(a => a.tipo !== 'sin_cambios');
  const aprobadas  = actionable.filter(a => statuses[a.path] === 'approved');
  const rechazadas = actionable.filter(a => statuses[a.path] === 'rejected');
  const pendientes = actionable.filter(a => !statuses[a.path]);

  const handleSubmit = async () => {
    if (!aprobadas.length) return;
    const params     = new URLSearchParams(window.location.search);
    const webhookUrl = data.webhook_url || params.get('webhook');
    if (!webhookUrl) {
      setSubmitMsg('Falta la URL del webhook en los datos. Configurala en n8n.');
      setSubmitState('error');
      return;
    }
    setSubmitState('submitting');
    try {
      const res = await fetch(webhookUrl, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          acciones_aprobadas: aprobadas,
          tema_principal:     data.tema_principal,
          slack_ts:           data.slack_ts,
          slack_channel:      data.slack_channel,
          total_aprobadas:    aprobadas.length,
          total_rechazadas:   rechazadas.length,
        }),
      });
      if (!res.ok) throw new Error(`El webhook respondió ${res.status}`);
      setSubmitState('success');
      setSubmitMsg(`✅ ${aprobadas.length} cambio(s) enviado(s) a GitHub. GitBook se actualizará en unos segundos.`);
    } catch (e) {
      setSubmitState('error');
      setSubmitMsg('Error al enviar: ' + e.message);
    }
  };

  // ── States ──
  if (loading) return (
    <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">
      <span className="animate-pulse">⏳ Cargando revisión…</span>
    </div>
  );
  if (loadErr) return (
    <div className="min-h-screen flex items-center justify-center p-8">
      <div className="text-center max-w-md">
        <div className="text-5xl mb-4">⚠️</div>
        <h2 className="text-gray-800 font-semibold mb-2">No se pudo cargar</h2>
        <p className="text-gray-500 text-sm">{loadErr}</p>
      </div>
    </div>
  );

  const updates   = acciones.filter(a => a.tipo === 'actualizar');
  const creates   = acciones.filter(a => a.tipo === 'crear');
  const noChanges = acciones.filter(a => a.tipo === 'sin_cambios');
  const pct       = actionable.length > 0 ? aprobadas.length / actionable.length * 100 : 0;

  return (
    <div className="max-w-4xl mx-auto px-4 pt-8 pb-32">

      {/* ── Header ── */}
      <div className="mb-9">
        <div className="flex items-start gap-3 mb-3">
          <span className="text-4xl mt-0.5">📚</span>
          <div>
            <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-0.5">Revisión de Documentación</p>
            <h1 className="text-2xl font-bold text-gray-900 leading-tight">{data.tema_principal || 'Cambios en GitBook'}</h1>
            {data.resumen_cambio && (
              <p className="text-sm text-gray-500 mt-1">{data.resumen_cambio}</p>
            )}
          </div>
        </div>

        {/* Stats row */}
        <div className="flex flex-wrap gap-3 ml-14 text-sm mb-4">
          {updates.length > 0   && <span className="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full font-medium">✏️ {updates.length} actualiz.</span>}
          {creates.length > 0   && <span className="bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full font-medium">🆕 {creates.length} nuevos</span>}
          {noChanges.length > 0 && <span className="bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full">⏸ {noChanges.length} sin cambios</span>}
        </div>

        {/* Progress */}
        {actionable.length > 0 && (
          <div className="ml-14">
            <div className="flex justify-between text-xs text-gray-400 mb-1">
              <span className="font-medium text-gray-600">{aprobadas.length} / {actionable.length} aprobados</span>
              <span>{pendientes.length} pendiente(s)</span>
            </div>
            <div className="w-72 bg-gray-200 rounded-full h-2">
              <div
                className="bg-emerald-500 h-2 rounded-full transition-all duration-500"
                style={{ width: `${pct}%` }}
              />
            </div>
          </div>
        )}
      </div>

      {/* ── Action sections ── */}
      {updates.length > 0 && (
        <Section title={`✏️ Actualizaciones — ${updates.length}`}>
          {updates.map(a => (
            <ActionCard key={a.path} action={a} status={statuses[a.path]} onApprove={() => approve(a.path)} onReject={() => reject(a.path)} />
          ))}
        </Section>
      )}

      {creates.length > 0 && (
        <Section title={`🆕 Artículos nuevos — ${creates.length}`}>
          {creates.map(a => (
            <ActionCard key={a.path} action={a} status={statuses[a.path]} onApprove={() => approve(a.path)} onReject={() => reject(a.path)} />
          ))}
        </Section>
      )}

      {noChanges.length > 0 && (
        <Section title={`⏸ Sin cambios — ${noChanges.length}`} defaultOpen={false}>
          {noChanges.map(a => (
            <ActionCard key={a.path} action={a} status={statuses[a.path]} onApprove={() => approve(a.path)} onReject={() => reject(a.path)} />
          ))}
        </Section>
      )}

      {/* ── Sticky submit bar ── */}
      <div className="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur border-t border-gray-200 shadow-xl">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <div className="text-sm">
            {submitState === 'success' && (
              <span className="text-emerald-600 font-semibold">{submitMsg}</span>
            )}
            {submitState === 'error' && (
              <span className="text-red-600 font-semibold">{submitMsg}</span>
            )}
            {(submitState === 'idle' || submitState === 'submitting') && (
              <span className="text-gray-600">
                {aprobadas.length > 0
                  ? `${aprobadas.length} cambio(s) listo(s) para aplicar`
                  : 'Aprobá los cambios que querés publicar en GitBook'}
              </span>
            )}
          </div>

          {submitState !== 'success' && (
            <button
              onClick={handleSubmit}
              disabled={aprobadas.length === 0 || submitState === 'submitting'}
              className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm
                ${aprobadas.length > 0 && submitState !== 'submitting'
                  ? 'bg-indigo-600 hover:bg-indigo-700 text-white'
                  : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
            >
              {submitState === 'submitting'
                ? '⏳ Aplicando…'
                : `Aplicar ${aprobadas.length} cambio(s) ✅`}
            </button>
          )}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
